                </li>

    <!-- main -->
    <main id="detail-root">
      <div class="section_line">
        <span class="line side"></span><span class="line center"></span
        ><span class="line side"></span>
      </div>

      <section class="product_section">
        <div class="menu_box">
          <ul>
            <li class="menu_img_title" data-category="base">
              <div><img src="./img/main/basemakeup_img.png" alt="base" /></div>
              <div>BASE</div>
            </li>
            <li class="menu_img_title" data-category="cheeks">
              <div><img src="./img/main/cheeks_img.png" alt="cheeks" /></div>
              <div>CHEEKS</div>
            </li>
            <li class="menu_img_title" data-category="eyes">
              <div><img src="./img/main/eyes_img.png" alt="eyes" /></div>
              <div>EYES</div>
            </li>
            <li class="menu_img_title" data-category="lips">
              <div><img src="./img/main/lips_img.png" alt="lips" /></div>
              <div>LIPS</div>
            </li>
            <li class="menu_img_title" data-category="nails">
              <div><img src="./img/main/nails_img.png" alt="nails" /></div>
              <div>NAILS</div>
            </li>
            <li class="menu_img_title" data-category="fragrance">
              <div>
                <img src="./img/main/fragrance_img.png" alt="fragrance" />
              </div>
              <div>FRAGRANCE</div>
            </li>
          </ul>
        </div>
      </section>

      <div class="section_line">
        <span class="line side"></span><span class="line center"></span
        ><span class="line side"></span>
      </div>

      <section class="wrap">
        <div class="layout">
          <!-- 왼쪽 -->
          <section class="left" aria-label="제품 정보">
            <div class="product-img">
              <img id="productImg" src="" alt="" />
            </div>

            <div class="left-text">
              <h2 class="shade-title" id="shadeTitle"></h2>
              <p class="shade-desc" id="shadeDesc"></p>
              <div class="badge" id="badge"></div>
            </div>
          </section>

          <!-- 오른쪽 -->
          <section class="right" aria-label="색상 선택">
            <h1 class="title" id="productTitle"></h1>

            <div
              class="swatch-row"
              id="swatches"
              aria-label="색상 스와치"
            ></div>

            <div class="price" id="productPrice"></div>

            <div class="buybox-wrap">
              <div class="buybox">
                <div class="small" id="buyText"></div>
                <div class="brand">
                  <a href="" id="buyLink">
                    <img
                      src="./img/product/bnr-store01.png"
                      alt="구매하러 가기"
                    />
                  </a>
                </div>
              </div>
            </div>
          </section>
        </div>
      </section>
    </main>

              <li class="right_social">
                <a

                  target="_blank"
                >

                <a
                  href="https://www.tiktok.com/@canmaketokyo_official"
                  target="_blank"
                >
